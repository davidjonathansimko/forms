<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>MATRIX | CORE TERMINAL</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root[data-theme="light"] { --accent: #00f2ff; --bg: url('/static/fliege.jpg'); }
        :root[data-theme="dark"] { --accent: #ff4d4d; --bg: url('/static/blood.jpg'); }

        body { margin: 0; height: 100vh; background: #000; font-family: 'Tektur'; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #bg-canvas { position: fixed; inset: 0; z-index: -2; opacity: 0.35; }
        body::before { content: ""; position: fixed; inset: 0; background-image: var(--bg); background-size: cover; filter: brightness(0.12) blur(15px); z-index: -3; }

        /* Comentarii AI (Doar în exterior) */
        .ai-popup {
            position: fixed; color: var(--accent); font-size: 1.1rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 10px #000, 0 0 15px var(--accent);
            pointer-events: none; z-index: 50; animation: chaos-in 2.5s forwards;
        }
        @keyframes chaos-in { 0% { transform: scale(0); opacity: 0; } 15% { transform: scale(1.1); opacity: 1; } 85% { opacity: 1; } 100% { transform: scale(0.8) translateY(-30px); opacity: 0; } }

        /* Mouse Trail (ASCII Wave) */
        .trail-node {
            position: fixed; pointer-events: none; z-index: 998;
            color: var(--accent); font-family: monospace; font-size: 24px;
            text-shadow: 0 0 15px var(--accent); animation: waveFlow 1.5s forwards;
        }
        @keyframes waveFlow {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(0.2); filter: blur(10px); }
        }

        /* Titel: FORMULAR */
        h1 {
            color: var(--accent); font-size: 4.5rem; letter-spacing: 15px; text-transform: uppercase;
            border-right: 5px solid var(--accent); width: 8ch; overflow: hidden; white-space: nowrap;
            animation: type 5s steps(8) infinite; margin-bottom: 20px; z-index: 100;
        }

        form {
            background: rgba(0, 0, 0, 0.88); backdrop-filter: blur(25px); width: 380px; padding: 35px;
            border: 1px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent);
            box-shadow: 0 0 80px rgba(0,0,0,1); position: relative; z-index: 100; transition: transform 0.1s ease-out;
        }
        label { display: block; margin-top: 15px; font-size: 0.85rem; color: var(--accent); letter-spacing: 2px; }
        input, select, textarea { width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 0; font-family: 'Tektur'; font-size: 1.2rem; outline: none; }

        .btn-deploy { margin-top: 30px; width: 100%; padding: 18px; background: transparent; color: var(--accent); border: 2px solid var(--accent); cursor: pointer; font-family: 'Tektur'; font-weight: 900; text-transform: uppercase; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s; }
        .btn-deploy:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        .theme-nav { position: absolute; top: 20px; right: 30px; z-index: 1001; }
        .theme-nav button { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 18px; cursor: pointer; font-family: 'Tektur'; font-weight: bold; margin-left: 10px; }

        #danger-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        @keyframes type { 0%, 10% { width: 0 } 50%, 80% { width: 8ch } 100% { width: 0 } }
    </style>
</head>
<body>
    <div id="danger-modal"><div style="border:1px solid var(--accent); padding:40px; background:#050505; text-align:center;"><h2 style="color:var(--accent); letter-spacing:5px;">INITIALIZE CORE</h2><button onclick="boot()" style="background:var(--accent); padding:15px 40px; border:none; cursor:pointer; font-weight:900; font-family:'Tektur';">EXECUTE</button></div></div>

    <canvas id="bg-canvas"></canvas>
    <audio id="audio" loop></audio>

    <div class="theme-nav">
        <button onclick="changeT('light')">LIGHT</button>
        <button onclick="changeT('dark')">DARK</button>
    </div>

    <h1>Formular - Core</h1>
    <form action="/submit" method="post" id="main-form">
        <input type="hidden" name="active_theme_input" id="theme-input" value="light">
        <label>User ID</label>
        <input type="text" name="username" oninput="spawnChaos('name')" required autocomplete="off">
        <label>Com-Link</label>
        <input type="email" name="email" oninput="spawnChaos('email')" required>
        <label>Access Key</label>
        <input type="password" name="passwort" required>
        <label>Origin</label>
        <select name="geschlecht">
            <option value="m">Männlich</option><option value="w">Weiblich</option><option value="d">Divers</option>
        </select>
        <label>Alter</label>
        <input type="number" name="alter" oninput="spawnChaos('age')" required>
        <button type="submit" class="btn-deploy">Deploy Data</button>
    </form>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('audio');
        const formEl = document.getElementById('main-form');
        const chars = "日한화ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%#&_";

        const quotes = {
            name: ["ECHT JETZT?", "BIST DU DAS?", "SYSTEM PRÜFT...", "WAS EIN NAME...", "SICHER?", "WIR SEHEN DICH."],
            email: ["SPAM DETEKTIERT", "WIRKLICH?", "DATEN LECK?", "ZUGRIFF ERLAUBT?", "INTERESSANT..."],
            age: ["DAS ENDE NAHT!", "ALT GENUG?", "CORE PRÜFT...", "ZEIT LÄUFT!", "STERBLICH?"]
        };

        function boot() { document.getElementById('danger-modal').style.display='none'; changeT('light'); }
        function changeT(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('theme-input').value = t;
            audio.src = `/static/${t}.mp3`; audio.play();
        }

        function spawnChaos(type) {
            const txt = quotes[type][Math.floor(Math.random()*quotes[type].length)];
            const div = document.createElement('div');
            div.className = 'ai-popup';
            div.innerText = txt;

            const rect = formEl.getBoundingClientRect();
            let x, y;
            const side = Math.floor(Math.random() * 4);

            if (side === 0) { x = Math.random() * window.innerWidth; y = Math.random() * rect.top - 50; }
            else if (side === 1) { x = rect.right + 20 + Math.random() * (window.innerWidth - rect.right - 150); y = Math.random() * window.innerHeight; }
            else if (side === 2) { x = Math.random() * window.innerWidth; y = rect.bottom + 20 + Math.random() * (window.innerHeight - rect.bottom - 50); }
            else { x = Math.random() * (rect.left - 150); y = Math.random() * window.innerHeight; }

            div.style.left = Math.max(10, Math.min(x, window.innerWidth - 160)) + "px";
            div.style.top = Math.max(10, Math.min(y, window.innerHeight - 50)) + "px";
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        // --- MATRIX ENGINE ---
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (Math.random() > 0.99) { ctx.fillStyle = "#fff"; ctx.fillText(text, i * fontSize, y * fontSize); ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent'); }
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 65);

        // --- MOUSE TRAIL & HUD TILT ---
        window.addEventListener('mousemove', (e) => {
            // ASCII Trail
            if (Math.random() > 0.4) {
                const node = document.createElement('div');
                node.className = 'trail-node';
                node.innerText = chars.charAt(Math.floor(Math.random() * chars.length));
                node.style.left = e.clientX + 'px';
                node.style.top = e.clientY + 'px';
                document.body.appendChild(node);
                setTimeout(() => node.remove(), 1200);
            }

            // Tilt
            let x = (window.innerWidth / 2 - e.pageX) / 30;
            let y = (window.innerHeight / 2 - e.pageY) / 30;
            formEl.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
